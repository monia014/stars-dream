<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARS' DREAM - Fireworks</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
/* 标题和副标题的容器 */
#title-container {
  position: fixed;
  top: 15%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  pointer-events: none;
  text-align: center;
  filter: drop-shadow(0 0 15px rgba(202, 240, 248, 0.8)) blur(0.5px);
  animation: float 6s ease-in-out infinite;
}

#main-title {
  color: #caf0f8;
  font-family: "Courier New", Courier, monospace;
  font-size: 3rem;
  letter-spacing: 0.8rem;
  margin-bottom: 0.5rem;
  opacity: 0.8;
  animation: glow 4s ease-in-out infinite alternate;
}

#sub-title {
  color: #ddeab0;
  font-family: "Courier New", Courier, monospace;
  font-size: 1rem;
  letter-spacing: 0.2rem;
  opacity: 0.6;
  text-transform: uppercase;
}

@keyframes float {
  0%, 100% { transform: translate(-50%, -55%); }
  50% { transform: translate(-50%, -45%); }
}

@keyframes glow {
  from { opacity: 0.7; }
  to { opacity: 0.9; }
}

*{margin:0;padding:0;box-sizing:border-box;}

/* 仅在非触摸设备（电脑）上显示噪点，节省移动端 GPU */
@media (hover: hover) {
  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    pointer-events: none;
    z-index: 10;
  }
}

body { background: #000; }

#webcam{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="title-container">
  <h1 id="main-title">STARS' DREAM</h1>
  <p id="sub-title">Fist to charge, Palm to explode.</p>
</div>
<video id="webcam" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ===== ⭐ 性能自动优化配置 ===== */
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const MAX = isMobile ? 350 : 800;          // 移动端减少粒子总数
const glowIntensity = isMobile ? 4 : 8;    // 移动端减弱发光强度
const starScale = isMobile ? 0.8 : 1.0;    // 移动端星星稍微调小

let vmin;

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  vmin = Math.min(canvas.width, canvas.height);
}
resize();
addEventListener("resize", resize);

/* ===== STAR ===== */
function drawStar(x,y,r,color,alpha=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*r, -Math.sin((18+i*72)*Math.PI/180)*r);
    ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*(r/2), -Math.sin((54+i*72)*Math.PI/180)*(r/2));
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

/* ===== PARTICLES ===== */
const palette=["#ddeab0", "#9790bf", "#ecbc68", "#d57194", "#69bddb"];
const particles = [];

class Particle{
  constructor(){ this.active=false; }
  spawn(x,y,vx,vy){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life=500+Math.random()*200;
    this.maxLife=this.life;
    const baseSize = vmin * 0.01;
    this.size = baseSize * (0.6 + Math.random() * 0.8);
    this.color=palette[Math.random()*palette.length|0];
    this.active=true;
  }
  update(){
    if(!this.active) return;
    this.vx *= 0.975;
    this.vy *= 0.975;
    if (this.x >= 0 && this.x <= canvas.width) {
      this.vy += 0.12; 
    } else {
      this.active = false; 
      return;
    }
    this.x += this.vx;
    this.y += this.vy;
    if (this.y > canvas.height + 50 || this.y < -100) this.active = false;
  }
  draw(){
    if(!this.active) return;
    ctx.save();
    // ⭐ 使用动态发光强度
    ctx.shadowBlur = glowIntensity;         
    ctx.shadowColor = this.color;
    drawStar(this.x, this.y, this.size * starScale, this.color, 1);
    ctx.restore();
  }
}

for(let i=0;i<MAX;i++) particles.push(new Particle());

function spawnExplosion(x,y,power){
  const count = (isMobile ? 40 : 80) + power * (isMobile ? 100 : 200);
  for(let i=0;i<count;i++){
    const p = particles.find(p=>!p.active);
    if(!p) break;
    const angle=Math.random()*Math.PI*2;
    const speed = (vmin*0.03) * (0.5+Math.random());
    p.spawn(x,y, Math.cos(angle)*speed, Math.sin(angle)*speed);
  }
}

/* ===== PALM/HAND LOGIC ===== */
function getPalmCenter(lm){
  const ids=[0,5,9,13,17];
  let x=0,y=0;
  ids.forEach(i=>{ x+=lm[i].x; y+=lm[i].y; });
  x/=ids.length; y/=ids.length;
  return { x:(1-x)*canvas.width, y:y*canvas.height };
}

let handsData = {};
function lerp(a,b,t){ return a+(b-a)*t; }

function getGesture(lm){
  const tips=[8,12,16,20], pip=[6,10,14,18];
  let open=0, states=[];
  for(let i=0;i<4;i++){
    const up = lm[tips[i]].y < lm[pip[i]].y;
    if(up) open++;
    states.push(up);
  }
  if(open===1 && states[0]) return "point";
  if(open>=3) return "palm";
  if(open<=1) return "fist";
  return "none";
}

/* ===== MEDIAPIPE ===== */
const video = document.getElementById("webcam");
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:2, modelComplexity: (isMobile ? 0 : 1), minDetectionConfidence:0.7, minTrackingConfidence:0.7 });

hands.onResults(res=>{
  const activeHands = new Set();
  if(res.multiHandLandmarks){
    res.multiHandLandmarks.forEach((lm,i)=>{
      activeHands.add(i);
      const palm = getPalmCenter(lm);
      const tx = palm.x, ty = palm.y - vmin*0.02;
      const fx = (1-lm[8].x)*canvas.width, fy = lm[8].y*canvas.height;
      if(!handsData[i]) handsData[i]={ x:tx,y:ty,tx,ty, prevX:tx,prevY:ty, charging:false };
      const h = handsData[i];
      h.tx = tx; h.ty = ty; h.fx = fx; h.fy = fy; h.gesture = getGesture(lm);
    });
  }
  Object.keys(handsData).forEach(id=>{ if(!activeHands.has(Number(id))) delete handsData[id]; });
});

/* ===== CAMERA ===== */
const camera = new Camera(video,{
  onFrame: async()=>{ await hands.send({image:video}); },
  // ⭐ 移动端降低分辨率以提升帧率
  width: isMobile ? 480 : 640,
  height: isMobile ? 360 : 480
});
camera.start();

/* ===== LOOP ===== */
function animate(){
  requestAnimationFrame(animate);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  Object.values(handsData).forEach(h=>{
    h.x = lerp(h.x,h.tx,0.25); h.y = lerp(h.y,h.ty,0.25);
    const vx = h.x - h.prevX, vy = h.y - h.prevY;
    const speed = Math.hypot(vx,vy);

    if(h.gesture==="point"){
      particles.forEach(p=>{
        if(!p.active) return;
        const dx = h.fx - p.x, dy = h.fy - p.y;
        const dist = Math.hypot(dx,dy);
        if(dist < 200){
          const pull = 0.05 * (1 - dist/200);
          p.vx += dx * pull; p.vy += dy * pull;
        }
      });
    }

    if(h.gesture==="fist"){
      if(!h.charging){ h.charging=true; h.start=performance.now(); }
      const t=(performance.now()-h.start)/1000;
      const power=Math.min(t/1.5,1);
      const r = vmin * 0.03 + power * vmin * 0.03;
      ctx.save();
      ctx.shadowBlur = (isMobile ? 10 : 20) * (0.5 + power);
      ctx.shadowColor = "#fee440";              
      drawStar(h.x, h.y, r * starScale, "#ffd166", 1);
      ctx.restore();
    }

    if(h.gesture==="palm"){
      if(h.charging){
        spawnExplosion(h.x,h.y,Math.min((performance.now()-h.start)/1500,1));
        h.charging=false;
      }
      if(speed>5){
        const hvx=vx/speed, hvy=vy/speed;
        particles.forEach(p=>{
          if(!p.active) return;
          const dx=p.x-h.x, dy=p.y-h.y, dist=Math.hypot(dx,dy);
          if(dist<150){
            const force=(1-dist/150)*speed*0.5;
            p.vx+=hvx*force; p.vy+=hvy*force;
          }
        });
      }
    }
    h.prevX = h.x; h.prevY = h.y;
  });
  particles.forEach(p=>{ p.update(); p.draw(); });
}
animate();
</script>
</body>
</html>
