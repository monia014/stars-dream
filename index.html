<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARS' DREAM - Fireworks</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
#title-container {
  position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%);
  z-index: 5; pointer-events: none; text-align: center;
  filter: drop-shadow(0 0 15px rgba(202, 240, 248, 0.8)) blur(0.5px);
  animation: float 6s ease-in-out infinite;
}
#main-title {
  color: #caf0f8; font-family: "Courier New", Courier, monospace;
  font-size: 3rem; letter-spacing: 0.8rem; margin-bottom: 0.5rem;
  opacity: 0.8; animation: glow 4s ease-in-out infinite alternate;
}
#sub-title {
  color: #ddeab0; font-family: "Courier New", Courier, monospace;
  font-size: 1rem; letter-spacing: 0.2rem; opacity: 0.4; text-transform: uppercase;
}
@keyframes float { 0%, 100% { transform: translate(-50%, -55%); } 50% { transform: translate(-50%, -45%); } }
@keyframes glow { from { opacity: 0.7; } to { opacity: 0.9; } }

*{margin:0;padding:0;box-sizing:border-box;}

#webcam {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  object-fit: cover; transform: scaleX(-1); z-index: 1;
  filter: contrast(1.1) saturate(1.2) blur(1.5px) drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
}
#webcam-glow-layer {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 2; pointer-events: none;
  backdrop-filter: blur(10px) brightness(1.3);
  -webkit-backdrop-filter: blur(10px) brightness(1.3);
  mix-blend-mode: screen; opacity: 0.4; 
}
#webcam-noise {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 3; pointer-events: none; opacity: 0.04;
}
@media (hover: hover) { #webcam-noise { background: url('https://grainy-gradients.vercel.app/noise.svg'); } }

canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 4; pointer-events: none; }
body { background: #000; overflow: hidden; }
</style>
</head>

<body>
  <div id="title-container">
    <h1 id="main-title">STARS' DREAM</h1>
    <p id="sub-title">Fist to charge, Palm to explode.</p>
  </div>
  
  <video id="webcam" autoplay playsinline></video>
  <div id="webcam-glow-layer"></div>
  <div id="webcam-noise"></div>
  <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const MAX = isMobile ? 400 : 1000;
const glowIntensity = isMobile ? 4 : 8;
const starScale = isMobile ? 1.5 : 1.0; 

let vmin;
function resize(){
  canvas.width = innerWidth; canvas.height = innerHeight;
  vmin = Math.min(canvas.width, canvas.height);
}
resize();
addEventListener("resize", resize);

function drawStar(x,y,r,color,alpha=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*r, -Math.sin((18+i*72)*Math.PI/180)*r);
    ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*(r/2), -Math.sin((54+i*72)*Math.PI/180)*(r/2));
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

class Particle{
  constructor(){ this.active=false; }
  spawn(x,y,vx,vy, lifeMult = 1){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life = (400 + Math.random()*200) * lifeMult;
    this.color = palette[Math.random()*palette.length|0];
    this.size = (vmin * 0.01) * (0.6 + Math.random() * 0.8);
    this.active = true;
  }
  update(){
    if(!this.active) return;
    this.vx *= 0.96; this.vy *= 0.96; this.vy += 0.1;
    this.x += this.vx; this.y += this.vy; this.life--;
    if(this.life <= 0 || this.y > canvas.height + 20) this.active = false;
  }
  draw(){
    if(!this.active) return;
    const alpha = Math.min(1, this.life / 60); 
    ctx.save();
    ctx.shadowBlur = glowIntensity; ctx.shadowColor = this.color;
    drawStar(this.x, this.y, this.size * starScale, this.color, alpha);
    ctx.restore();
  }
}

const palette=["#ddeab0", "#9790bf", "#ecbc68", "#d57194", "#69bddb"];
const particles = Array.from({length: MAX}, () => new Particle());

function spawnExplosion(x,y,power, isMini = false){
  const count = isMini ? (isMobile ? 25 : 45) : (80 + power * 150);
  const lifeMult = isMini ? 0.45 : 1.0;
  for(let i=0;i<count;i++){
    const p = particles.find(p=>!p.active);
    if(!p) break;
    const angle = Math.random()*Math.PI*2;
    const speed = isMini ? (vmin*0.02 * (0.5+Math.random())) : (vmin*0.03 * (0.5+Math.random()));
    p.spawn(x,y, Math.cos(angle)*speed, Math.sin(angle)*speed, lifeMult);
  }
}

function getPalmCenter(lm){
  const ids=[0,5,9,13,17];
  let x=0,y=0;
  ids.forEach(i=>{ x+=lm[i].x; y+=lm[i].y; });
  return { x:(1-x/ids.length)*canvas.width, y:(y/ids.length)*canvas.height };
}

function getGesture(lm){
  const tips=[8,12,16,20], pip=[6,10,14,18];
  let open=0, states=[];
  for(let i=0;i<4;i++){
    const up = lm[tips[i]].y < lm[pip[i]].y;
    if(up) open++;
    states.push(up);
  }
  if(open===1 && states[0]) return "point";
  if(open>=3) return "palm";
  if(open<=1) return "fist";
  return "none";
}

let handsData = {};
const lerp = (a,b,t) => a+(b-a)*t;

const video = document.getElementById("webcam");
const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:2, modelComplexity: (isMobile ? 0 : 1), minDetectionConfidence:0.7, minTrackingConfidence:0.7 });

hands.onResults(res=>{
  const activeIds = new Set();
  if(res.multiHandLandmarks){
    res.multiHandLandmarks.forEach((lm,i)=>{
      activeIds.add(i);
      const palm = getPalmCenter(lm);
      if(!handsData[i]) {
        handsData[i] = { 
          x: palm.x, y: palm.y, 
          prevX: palm.x, prevY: palm.y, 
          pointStart: null, hasBurst: false 
        };
      }
      const h = handsData[i];
      h.tx = palm.x; h.ty = palm.y - vmin*0.02;
      h.fx = (1-lm[8].x)*canvas.width; h.fy = lm[8].y*canvas.height;
      h.gesture = getGesture(lm);
    });
  }
  Object.keys(handsData).forEach(id => { if(!activeIds.has(Number(id))) delete handsData[id]; });
});

const camera = new Camera(video,{
  onFrame: async()=>{ await hands.send({image:video}); },
  width: isMobile ? 480 : 640, height: isMobile ? 360 : 480
});
camera.start();

function animate(){
  requestAnimationFrame(animate);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const now = performance.now();

  Object.values(handsData).forEach(h=>{
    h.x = lerp(h.x, h.tx, 0.2); h.y = lerp(h.y, h.ty, 0.2);

    // --- ☝️ 食指：聚集至虚空点 ---
    if(h.gesture === "point"){
      if(!h.pointStart) { h.pointStart = now; h.hasBurst = false; }
      const elapsed = (now - h.pointStart) / 1000;
      const focusX = h.fx;
      const focusY = h.fy - vmin * 0.07; 

      if(elapsed < 1.0){
        particles.forEach(p => {
          if(!p.active) return;
          const dx = focusX - p.x, dy = focusY - p.y;
          const dist = Math.hypot(dx, dy);
          if(dist < 250){
            const angle = Math.atan2(dy, dx);
            const pull = 0.15 * (1 - dist/250);
            p.vx += Math.cos(angle + Math.PI/2) * 0.6 + dx * pull;
            p.vy += Math.sin(angle + Math.PI/2) * 0.6 + dy * pull;
            if(elapsed > 0.8) { 
              p.x = lerp(p.x, focusX, 0.15); 
              p.y = lerp(p.y, focusY, 0.15); 
              p.life = Math.max(p.life, 15);
            }
          }
        });
      } else if(!h.hasBurst){
        // 炸裂时刻
        particles.forEach(p => { if(p.active && Math.hypot(p.x - focusX, p.y - focusY) < 50) p.active = false; });
        spawnExplosion(focusX, focusY, 0, true);
        h.hasBurst = true;
      }
    } else {
      h.pointStart = null; h.hasBurst = false;
    }

    // --- ✋ 手掌：扫走星星 + 引爆 ---
    if(h.gesture === "palm"){
      const vx = h.x - h.prevX;
      const vy = h.y - h.prevY;
      const speed = Math.hypot(vx, vy);

      if(speed > 5){
        particles.forEach(p => {
          if(!p.active) return;
          const dx = p.x - h.x, dy = p.y - h.y;
          const dist = Math.hypot(dx, dy);
          if(dist < 150){
            const force = (1 - dist / 150) * 0.5;
            p.vx += vx * force; p.vy += vy * force;
          }
        });
      }
      if(h.charging){
        spawnExplosion(h.x, h.y, Math.min((now - h.chargeStart)/1500, 1));
        h.charging = false;
      }
    }

    // --- ✊ 握拳：蓄力 ---
    if(h.gesture === "fist"){
      if(!h.charging){ h.charging=true; h.chargeStart=now; }
      const power = Math.min((now - h.chargeStart)/1500, 1);
      ctx.save();
      ctx.shadowBlur = 20 * (0.5 + power); ctx.shadowColor = "#fee440";              
      drawStar(h.x, h.y, (vmin*0.03 + power*vmin*0.03)*starScale, "#ffd166", 1);
      ctx.restore();
    }

    h.prevX = h.x; h.prevY = h.y;
  });
  particles.forEach(p=>{ p.update(); p.draw(); });
}
animate();
</script>
</body>
</html>
